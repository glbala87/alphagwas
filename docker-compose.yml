version: '3.8'

services:
  # Main AlphaGWAS pipeline service
  alphagwas:
    build:
      context: .
      dockerfile: Dockerfile
    image: alphagwas:latest
    container_name: alphagwas-pipeline

    # Mount volumes for data persistence
    volumes:
      - ./data/input:/app/data/input:ro       # Input data (read-only)
      - ./data/intermediate:/app/data/intermediate  # Checkpoints
      - ./data/output:/app/data/output         # Results
      - ./config:/app/config:ro                # Configuration (read-only)

    # Environment variables
    environment:
      - ALPHAGENOME_API_KEY=${ALPHAGENOME_API_KEY:-}
      - PYTHONUNBUFFERED=1

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G

    # Default command: show help
    command: ["--help"]

  # Development service with mounted source code
  alphagwas-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: alphagwas:dev
    container_name: alphagwas-dev

    volumes:
      - .:/app                                 # Mount entire project
      - ./data/input:/app/data/input
      - ./data/intermediate:/app/data/intermediate
      - ./data/output:/app/data/output

    environment:
      - ALPHAGENOME_API_KEY=${ALPHAGENOME_API_KEY:-}
      - PYTHONUNBUFFERED=1

    # Keep container running for interactive use
    command: ["tail", "-f", "/dev/null"]
    stdin_open: true
    tty: true

  # Test runner service
  alphagwas-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: alphagwas:test
    container_name: alphagwas-test

    volumes:
      - .:/app:ro
      - ./tests:/app/tests:ro

    environment:
      - PYTHONUNBUFFERED=1

    entrypoint: ["python", "-m", "pytest"]
    command: ["tests/", "-v", "--tb=short"]

# Named volumes for persistent data
volumes:
  alphagwas-data:
    driver: local
