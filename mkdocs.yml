site_name: AlphaGWAS Documentation
site_description: GWAS Variant Prioritization using AlphaGenome
site_author: BalaSubramani Gattu Linga
site_url: https://glbala87.github.io/alphagwas

repo_name: glbala87/alphagwas
repo_url: https://github.com/glbala87/alphagwas

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Pipeline Overview: guide/pipeline.md
    - Running the Pipeline: guide/running.md
    - Visualizations: guide/visualizations.md
    - Fine-mapping: guide/finemapping.md
    - Pathway Enrichment: guide/enrichment.md
    - Colocalization: guide/colocalization.md
    - Multi-Phenotype Analysis: guide/multiphenotype.md
    - Streamlit Dashboard: guide/dashboard.md
    - REST API: guide/api.md
  - API Reference:
    - Extract Variants: api/extract_variants.md
    - AlphaGenome Predict: api/alphagenome_predict.md
    - Score Variants: api/score_variants.md
    - Utilities: api/utils.md
  - Examples:
    - Cardiovascular GWAS: examples/cardiovascular.md
    - Metabolic Traits: examples/metabolic.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/glbala87/alphagwas
  generator: false
